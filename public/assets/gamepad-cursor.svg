<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" aria-hidden="true">
  <!-- Clean, high-contrast gamepad silhouette for cursor -->
  <rect x="3" y="9" width="26" height="14" rx="4" ry="4" fill="#ffffff" stroke="#000000" stroke-width="1" />
  <!-- Left grip cutout -->
  <path d="M3 16c0 0 2 6 8 6" fill="none" stroke="#000" stroke-width="1" stroke-linecap="round" />
  <!-- Right grip cutout -->
  <path d="M29 16c0 0-2 6-8 6" fill="none" stroke="#000" stroke-width="1" stroke-linecap="round" />

  <!-- D-pad (left) -->
  <rect x="8.5" y="13.5" width="3" height="5" rx="0.6" fill="#000" />
  <rect x="7" y="15" width="5" height="3" rx="0.6" fill="#000" />

  <!-- Buttons (right) -->
  <circle cx="22" cy="13.5" r="1.6" fill="#000" />
  <circle cx="25" cy="15.5" r="1.6" fill="#000" />
  <circle cx="19" cy="15.5" r="1.6" fill="#000" />
  <circle cx="22" cy="17.5" r="1.6" fill="#000" />
</svg>
